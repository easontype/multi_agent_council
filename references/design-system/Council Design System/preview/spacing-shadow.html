<!doctype html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="card" style="padding: 32px; background:#fafafa;">
  <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap: 18px;">

    <div style="background:#fff; border:1px solid #ebebed; border-radius: 12px; padding: 18px; box-shadow: 0 1px 4px rgba(0,0,0,0.04); min-height: 110px; display:flex; flex-direction:column; justify-content:space-between;">
      <span class="micro">Card</span>
      <div>
        <div style="font-size:12px; color:#3f3f46; font-weight:600;">Hairline</div>
        <span class="mono" style="font-size:10px; color:#9ca3af;">0 1px 4px / 0.04</span>
      </div>
    </div>

    <div style="background:#fff; border:1px solid #ebebed; border-radius: 12px; padding: 18px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); min-height: 110px; display:flex; flex-direction:column; justify-content:space-between;">
      <span class="micro">Hover</span>
      <div>
        <div style="font-size:12px; color:#3f3f46; font-weight:600;">Card · hover</div>
        <span class="mono" style="font-size:10px; color:#9ca3af;">0 2px 8px / 0.07</span>
      </div>
    </div>

    <div style="background:#111827; color:#fff; border-radius: 12px; padding: 18px; box-shadow: 0 8px 22px rgba(17,24,39,0.16); min-height: 110px; display:flex; flex-direction:column; justify-content:space-between;">
      <span class="micro" style="color:#a1a1aa;">CTA</span>
      <div>
        <div style="font-size:12px; font-weight:600;">Start Review</div>
        <span class="mono" style="font-size:10px; color:#71717a;">0 8px 22px / 0.16</span>
      </div>
    </div>

    <div style="grid-column: span 3; background:#fff; border:1px solid #ebebed; border-radius: 16px; padding: 20px; box-shadow: 0 24px 60px rgba(15,23,42,0.16); min-height: 90px; display:flex; justify-content: space-between; align-items: center;">
      <div>
        <span class="micro">Modal elevation</span>
        <div style="font-size:13px; color:#1a1a1a; font-weight:600; margin-top: 4px;">Team Builder</div>
      </div>
      <span class="mono" style="font-size:10px; color:#9ca3af;">0 24px 60px rgba(15,23,42,0.16)</span>
    </div>

  </div>
</div>
</body>
</html>
