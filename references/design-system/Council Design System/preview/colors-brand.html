<!doctype html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="card" style="padding: 28px 32px;">
  <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 16px;">

    <!-- Brand indigo -->
    <div style="border: 1px solid #ececf1; border-radius: 12px; padding: 16px; background: #fff;">
      <div class="micro" style="margin-bottom: 12px;">Brand Indigo</div>
      <div style="display:flex; gap: 6px; margin-bottom: 12px;">
        <div style="flex:1; aspect-ratio:1/1; border-radius:6px; background:#f8faff; border:1px solid #f0f0f2;"></div>
        <div style="flex:1; aspect-ratio:1/1; border-radius:6px; background:#eef2ff;"></div>
        <div style="flex:1; aspect-ratio:1/1; border-radius:6px; background:#c7d2fe;"></div>
        <div style="flex:1; aspect-ratio:1/1; border-radius:6px; background:#6366f1;"></div>
        <div style="flex:1; aspect-ratio:1/1; border-radius:6px; background:#3730a3;"></div>
      </div>
      <div style="font-size: 11px; color: #71717a; line-height: 1.6;">
        Wordmark, Beta chip, Custom badge, Team Builder card. Used sparingly.
      </div>
    </div>

    <!-- CTA black -->
    <div style="border: 1px solid #ececf1; border-radius: 12px; padding: 16px; background: #fff;">
      <div class="micro" style="margin-bottom: 12px;">Primary CTA</div>
      <div style="display:flex; align-items:center; gap: 10px; margin-bottom: 12px;">
        <button style="border:none; background:#111827; color:#fff; border-radius:10px; padding: 9px 14px; font-size: 12.5px; font-weight: 600; box-shadow: 0 8px 22px rgba(17,24,39,0.16); font-family: inherit;">Start Review</button>
        <span class="mono" style="font-size:10px; color:#71717a;">#111827</span>
      </div>
      <div style="font-size: 11px; color: #71717a; line-height: 1.6;">
        The only filled button in the UI. White text. All other buttons are ghost.
      </div>
    </div>

  </div>
</div>
</body>
</html>
