<!doctype html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="card" style="padding: 28px 32px;">
  <div class="micro" style="margin-bottom: 16px;">Spacing scale (px)</div>
  <div style="display:flex; align-items:flex-end; gap: 12px; margin-bottom: 18px;">
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="width:4px; height:4px; background:#111827;"></div><span class="mono" style="font-size:10px; color:#71717a;">4</span></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="width:6px; height:6px; background:#111827;"></div><span class="mono" style="font-size:10px; color:#71717a;">6</span></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="width:8px; height:8px; background:#111827;"></div><span class="mono" style="font-size:10px; color:#71717a;">8</span></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="width:10px; height:10px; background:#111827;"></div><span class="mono" style="font-size:10px; color:#71717a;">10</span></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="width:12px; height:12px; background:#111827;"></div><span class="mono" style="font-size:10px; color:#71717a;">12</span></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="width:14px; height:14px; background:#111827;"></div><span class="mono" style="font-size:10px; color:#71717a;">14</span></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="width:16px; height:16px; background:#111827;"></div><span class="mono" style="font-size:10px; color:#71717a;">16</span></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="width:20px; height:20px; background:#111827;"></div><span class="mono" style="font-size:10px; color:#71717a;">20</span></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="width:24px; height:24px; background:#111827;"></div><span class="mono" style="font-size:10px; color:#71717a;">24</span></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="width:32px; height:32px; background:#111827;"></div><span class="mono" style="font-size:10px; color:#71717a;">32</span></div>
  </div>

  <div style="padding-top: 14px; border-top: 1px solid #f0f0f2;">
    <div class="micro" style="margin-bottom: 10px;">Borders</div>
    <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap: 10px;">
      <div style="border: 1px solid #f0f0f2; border-radius:6px; padding: 10px 12px; font-size: 11px; color:#71717a;"><span class="mono" style="color:#3f3f46;">#f0f0f2</span><br><span style="color:#a1a1aa; font-size:10px;">hairline-light</span></div>
      <div style="border: 1px solid #ececf1; border-radius:6px; padding: 10px 12px; font-size: 11px; color:#71717a;"><span class="mono" style="color:#3f3f46;">#ececf1</span><br><span style="color:#a1a1aa; font-size:10px;">hairline</span></div>
      <div style="border: 1px solid #e4e4e7; border-radius:6px; padding: 10px 12px; font-size: 11px; color:#71717a;"><span class="mono" style="color:#3f3f46;">#e4e4e7</span><br><span style="color:#a1a1aa; font-size:10px;">strong</span></div>
      <div style="border: 1px dashed #c7c7cf; border-radius:6px; padding: 10px 12px; font-size: 11px; color:#71717a;"><span class="mono" style="color:#3f3f46;">dashed</span><br><span style="color:#a1a1aa; font-size:10px;">add · empty</span></div>
    </div>
  </div>
</div>
</body>
</html>
