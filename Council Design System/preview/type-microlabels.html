<!doctype html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="card" style="padding: 28px 32px;">
  <div style="display: flex; flex-direction: column; gap: 14px;">
    <div style="display:flex; align-items: baseline; gap: 14px;">
      <span class="micro" style="letter-spacing:0.12em; color:#ccc;">Round</span>
      <span style="font-family: Georgia, serif; font-size: 36px; font-weight: 800; color:#f0f0f2; line-height:1; letter-spacing:-0.03em;">2</span>
      <div style="flex:1; height:1px; background:#f0f0f2;"></div>
    </div>

    <div style="display:flex; flex-wrap: wrap; gap: 16px; font-size: 10px; font-weight: 700; text-transform: uppercase;">
      <span style="letter-spacing: 0.06em; color: #a1a1aa;">Review Setup</span>
      <span style="letter-spacing: 0.07em; color: #a1a1aa;">Cited Sources</span>
      <span style="letter-spacing: 0.08em; color: #9ca3af;">Evidence</span>
      <span style="letter-spacing: 0.12em; color: #ccc;">Panel</span>
      <span style="letter-spacing: 0.06em; color: #4f46e5;">Custom</span>
      <span style="letter-spacing: 0.05em; color: #6366f1;">Beta</span>
    </div>

    <div style="font-size: 11px; color: #9ca3af; line-height: 1.55; border-top: 1px solid #f0f0f2; padding-top: 12px;">
      Uppercase · 700 weight · letter-spacing 0.06 – 0.12em · color <span class="mono" style="color:#52525b;">#a1a1aa</span> / <span class="mono" style="color:#52525b;">#9ca3af</span>
    </div>
  </div>
</div>
</body>
</html>
