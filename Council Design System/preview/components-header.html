<!doctype html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>

    <div style="display:flex; align-items:center; gap: 6px;">
      <button style="background:transparent; border:none; padding: 4px; cursor:pointer; color:#52525b;">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18L9 12L15 6"/></svg>
      </button>
      <span style="font-family: inherit; font-size: 14px; font-weight: 700; color:#6366f1; letter-spacing: -0.01em;">Council</span>
      <span style="background:#eef2ff; color:#6366f1; font-size: 9px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; padding: 2px 5px; border-radius: 3px;">Beta</span>
    </div>

    <div style="flex:1; min-width:0; display:flex; align-items:center; gap: 8px;">

      <span style="font-family: Georgia, serif; font-size: 13px; font-weight: 600; color:#27272a; letter-spacing:-0.01em; overflow:hidden; text-overflow: ellipsis; white-space: nowrap;">Attention Is All You Need</span>
      <span style="font-size: 10px; color:#a1a1aa; letter-spacing: 0.08em; text-transform: uppercase; font-weight:700;">Under Review</span>
    </div>

    <div style="display:flex; gap: 6px;">
      <button style="background:transparent; border:1px solid #ececf1; border-radius:8px; padding: 5px 10px; font: 500 11.5px inherit; color:#52525b; cursor:pointer;">Copy Share URL</button>
      <button style="background:transparent; border:1px solid #ececf1; border-radius:8px; padding: 5px 10px; font: 500 11.5px inherit; color:#52525b; cursor:pointer;">Make Private</button>
    </div>
  </header>

  <div style="padding: 26px 20px 20px;">
    <div style="font-size: 10px; color:#a1a1aa; letter-spacing: 0.07em; text-transform: uppercase; font-weight:700;">App header · /analyze workspace</div>
  </div>
