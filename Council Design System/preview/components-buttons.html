<!doctype html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="card" style="padding: 28px 32px;">
  <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 20px 28px; align-items:start;">

    <div>
      <div class="micro" style="margin-bottom: 12px;">Primary</div>
      <button style="background:#111827; color:#fff; border:none; border-radius: 12px; padding: 12px 18px; font: 600 13.5px inherit; box-shadow: 0 8px 22px rgba(17,24,39,0.16); cursor:pointer;">Start Review</button>
      <div style="margin-top: 10px;">
        <button style="background:#d4d4d8; color:#fff; border:none; border-radius: 12px; padding: 12px 18px; font: 600 13.5px inherit; cursor:default;" disabled>Preparing paper library…</button>
      </div>
    </div>

    <div>
      <div class="micro" style="margin-bottom: 12px;">Secondary</div>
      <button style="background:#fff; color:#3f3f46; border:1px solid #e4e4e7; border-radius: 10px; padding: 10px 14px; font: 600 12.5px inherit; cursor:pointer;">Build Team</button>
      <button style="margin-left:6px; background:transparent; color:#666; border:1px solid transparent; border-radius: 8px; padding: 6px 10px; font: 500 12px inherit; cursor:pointer;">Cancel</button>
    </div>

    <div>
      <div class="micro" style="margin-bottom: 12px;">Toggle group</div>
      <div style="display:inline-flex; background:#f5f5f7; border-radius: 10px; padding: 3px; gap: 2px;">
        <button style="background:#111827; color:#fff; border:none; border-radius: 8px; padding: 6px 12px; font: 600 12px inherit; cursor:pointer;">Debate</button>
        <button style="background:transparent; color:#71717a; border:none; border-radius: 8px; padding: 6px 12px; font: 500 12px inherit; cursor:pointer;">Compare</button>
      </div>
    </div>

    <div>
      <div class="micro" style="margin-bottom: 12px;">Add · dashed</div>
      <button style="background:transparent; color:#71717a; border:1px dashed #c7c7cf; border-radius: 10px; padding: 10px 14px; font: 500 12.5px inherit; cursor:pointer;">+ Add Manual Seat</button>
    </div>

    <div style="grid-column: 1 / -1; padding-top: 14px; border-top: 1px solid #f0f0f2;">
      <div class="micro" style="margin-bottom: 12px;">Input</div>
      <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 12px;">
        <input placeholder="arxiv.org/abs/2410.xxxxx" style="font: 400 13px inherit; color:#18181b; padding: 10px 12px; border:1px solid #e4e4e7; border-radius: 10px; background:#fff; outline:none; width:100%;">
        <input placeholder="Team name" value="ML Systems panel" style="font: 500 13px inherit; color:#18181b; padding: 10px 12px; border:1px solid #111827; border-radius: 10px; background:#fff; outline:none; width:100%;">
      </div>
    </div>
  </div>
</div>
</body>
</html>
