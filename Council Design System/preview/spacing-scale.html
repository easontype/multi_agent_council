<!doctype html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="card" style="padding: 28px 32px;">
  <div style="display:flex; align-items:flex-end; gap: 10px;">
    <div style="width:4px;  height:52px; background:#27272a; border-radius:2px;"></div>
    <div style="width:6px;  height:52px; background:#27272a; border-radius:2px;"></div>
    <div style="width:8px;  height:52px; background:#27272a; border-radius:2px;"></div>
    <div style="width:10px; height:52px; background:#27272a; border-radius:2px;"></div>
    <div style="width:12px; height:52px; background:#27272a; border-radius:2px;"></div>
    <div style="width:14px; height:52px; background:#27272a; border-radius:2px;"></div>
    <div style="width:16px; height:52px; background:#27272a; border-radius:2px;"></div>
    <div style="width:18px; height:52px; background:#27272a; border-radius:2px;"></div>
    <div style="width:20px; height:52px; background:#27272a; border-radius:2px;"></div>
    <div style="width:24px; height:52px; background:#27272a; border-radius:2px;"></div>
    <div style="width:32px; height:52px; background:#27272a; border-radius:2px;"></div>
    <div style="width:40px; height:52px; background:#27272a; border-radius:2px;"></div>
  </div>
  <div style="display:flex; gap:10px; margin-top: 8px; font-family: 'SFMono-Regular', Consolas, monospace; font-size: 10px; color: #9ca3af;">
    <span style="width:4px; text-align:center;">4</span>
    <span style="width:6px; text-align:center;">6</span>
    <span style="width:8px; text-align:center;">8</span>
    <span style="width:10px; text-align:center;">10</span>
    <span style="width:12px; text-align:center;">12</span>
    <span style="width:14px; text-align:center;">14</span>
    <span style="width:16px; text-align:center;">16</span>
    <span style="width:18px; text-align:center;">18</span>
    <span style="width:20px; text-align:center;">20</span>
    <span style="width:24px; text-align:center;">24</span>
    <span style="width:32px; text-align:center;">32</span>
    <span style="width:40px; text-align:center;">40</span>
  </div>

  <div style="margin-top: 22px; padding-top: 16px; border-top: 1px solid #f0f0f2; font-size: 11px; color: #9ca3af; line-height: 1.6;">
    Card padding <span class="mono" style="color:#52525b">16 × 18</span> · Dense rows <span class="mono" style="color:#52525b">10 × 20</span> · Gap rhythm <span class="mono" style="color:#52525b">6 / 10 / 16</span>
  </div>
</div>
</body>
</html>
