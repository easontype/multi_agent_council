<!doctype html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="card" style="padding: 28px 28px;">
  <div style="display:grid; grid-template-columns: repeat(14, 1fr); gap: 0; border-radius: 6px; overflow: hidden; border: 1px solid #ececf1;">
    <div style="aspect-ratio: 1/1; background: #ffffff; border-right: 1px solid #f0f0f2;"></div>
    <div style="aspect-ratio: 1/1; background: #fcfcfb; border-right: 1px solid #f0f0f2;"></div>
    <div style="aspect-ratio: 1/1; background: #fafafa; border-right: 1px solid #f0f0f2;"></div>
    <div style="aspect-ratio: 1/1; background: #f5f5f7; border-right: 1px solid #f0f0f2;"></div>
    <div style="aspect-ratio: 1/1; background: #f0f0f2; border-right: 1px solid #ececf1;"></div>
    <div style="aspect-ratio: 1/1; background: #ececf1; border-right: 1px solid #e4e4e7;"></div>
    <div style="aspect-ratio: 1/1; background: #e4e4e7;"></div>
    <div style="aspect-ratio: 1/1; background: #d4d4d8;"></div>
    <div style="aspect-ratio: 1/1; background: #a1a1aa;"></div>
    <div style="aspect-ratio: 1/1; background: #71717a;"></div>
    <div style="aspect-ratio: 1/1; background: #52525b;"></div>
    <div style="aspect-ratio: 1/1; background: #3f3f46;"></div>
    <div style="aspect-ratio: 1/1; background: #27272a;"></div>
    <div style="aspect-ratio: 1/1; background: #111827;"></div>
  </div>

  <div style="display:grid; grid-template-columns: repeat(14, 1fr); gap:0; margin-top: 6px; font-size: 9px; color: #9ca3af; font-family: 'SFMono-Regular', Consolas, monospace;">
    <span style="text-align:center;">fff</span>
    <span style="text-align:center;">fcfb</span>
    <span style="text-align:center;">fafa</span>
    <span style="text-align:center;">f5f7</span>
    <span style="text-align:center;">f0f2</span>
    <span style="text-align:center;">ecf1</span>
    <span style="text-align:center;">e4e7</span>
    <span style="text-align:center;">d4d8</span>
    <span style="text-align:center;">a1aa</span>
    <span style="text-align:center;">717a</span>
    <span style="text-align:center;">525b</span>
    <span style="text-align:center;">3f46</span>
    <span style="text-align:center;">272a</span>
    <span style="text-align:center; color:#fff; background:#111827; border-radius:3px;">1827</span>
  </div>

  <div style="margin-top: 22px; display:flex; justify-content: space-between; font-size: 11px; color: #9ca3af; line-height: 1.6;">
    <span><span class="micro">Canvas</span> <span class="mono">#fff</span> &nbsp; <span class="mono">#fafafa</span> &nbsp; <span class="mono">#fcfcfb</span></span>
    <span><span class="micro">CTA</span> <span class="mono" style="color:#111827; font-weight:700;">#111827</span></span>
  </div>
</div>
</body>
</html>
