<!doctype html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="card" style="padding: 28px 32px;">
  <div style="display:grid; grid-template-columns: repeat(5, 1fr); gap: 18px 14px; color:#71717a;">

    <div style="display:flex; flex-direction: column; align-items: center; gap: 8px;">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18L9 12L15 6"/></svg>
      <span style="font-size: 10px; color:#a1a1aa;">back</span>
    </div>

    <div style="display:flex; flex-direction: column; align-items: center; gap: 8px;">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><path d="M14 3v6h6"/><path d="M9 13h6M9 17h4"/></svg>
      <span style="font-size: 10px; color:#a1a1aa;">paper</span>
    </div>

    <div style="display:flex; flex-direction: column; align-items: center; gap: 8px;">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19V6a2 2 0 0 1 2-2h8l6 6v9a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2z"/><path d="M14 4v6h6"/></svg>
      <span style="font-size: 10px; color:#a1a1aa;">open book</span>
    </div>

    <div style="display:flex; flex-direction: column; align-items: center; gap: 8px;">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7M17 7H9M17 7V15"/></svg>
      <span style="font-size: 10px; color:#a1a1aa;">external</span>
    </div>

    <div style="display:flex; flex-direction: column; align-items: center; gap: 8px;">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
      <span style="font-size: 10px; color:#a1a1aa;">waiting</span>
    </div>

    <div style="display:flex; flex-direction: column; align-items: center; gap: 8px;">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21L16 16"/></svg>
      <span style="font-size: 10px; color:#a1a1aa;">search</span>
    </div>

    <div style="display:flex; flex-direction: column; align-items: center; gap: 8px;">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M8 12.5L11 15.5L16 9.5"/></svg>
      <span style="font-size: 10px; color:#a1a1aa;">check</span>
    </div>

    <div style="display:flex; flex-direction: column; align-items: center; gap: 8px;">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
      <span style="font-size: 10px; color:#a1a1aa;">chevron</span>
    </div>

    <div style="display:flex; flex-direction: column; align-items: center; gap: 8px;">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12a8 8 0 1 1 4 6.9"/></svg>
      <span style="font-size: 10px; color:#a1a1aa;">spinner</span>
    </div>

    <div style="display:flex; flex-direction: column; align-items: center; gap: 8px;">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
      <span style="font-size: 10px; color:#a1a1aa;">upload</span>
    </div>
  </div>

  <div style="margin-top: 20px; padding-top: 14px; border-top: 1px solid #f0f0f2; font-size: 11px; color:#71717a; line-height: 1.65;">
    Outlined · 2px stroke · round caps/joins · <span class="mono">currentColor</span>. Rendered inline at 11–15px next to labels, 28–36px in empty states.
  </div>
</div>
</body>
</html>
