<!doctype html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="card" style="padding: 28px 32px;">

  <!-- ROUND DIVIDER -->
  <div style="display:flex; align-items: baseline; gap: 14px; margin-bottom: 20px;">
    <span style="font-size: 10px; font-weight:700; letter-spacing: 0.12em; color:#ccc; text-transform:uppercase;">Round</span>
    <span style="font-family: Georgia, serif; font-size: 36px; font-weight:800; color:#f0f0f2; letter-spacing: -0.03em; line-height: 1;">2</span>
    <div style="flex:1; height:1px; background:#f0f0f2;"></div>
    <span style="font-size: 11px; color:#a1a1aa;">cross-examination</span>
  </div>

  <!-- ROSTER -->
  <div style="display:flex; align-items:center; gap: 10px; flex-wrap: wrap;">
    <span class="micro" style="margin-right: 4px;">Panel</span>
    <div style="display:flex;">
      <div style="width:22px; height:22px; border-radius:50%; background:#43506b; color:#fff; font:700 9px Georgia,serif; display:flex; align-items:center; justify-content:center; border:2px solid #fff;">M</div>
      <div style="width:22px; height:22px; border-radius:50%; background:#65505f; color:#fff; font:700 9px Georgia,serif; display:flex; align-items:center; justify-content:center; border:2px solid #fff; margin-left:-6px;">L</div>
      <div style="width:22px; height:22px; border-radius:50%; background:#466671; color:#fff; font:700 9px Georgia,serif; display:flex; align-items:center; justify-content:center; border:2px solid #fff; margin-left:-6px;">R</div>
      <div style="width:22px; height:22px; border-radius:50%; background:#59674b; color:#fff; font:700 9px Georgia,serif; display:flex; align-items:center; justify-content:center; border:2px solid #fff; margin-left:-6px;">C</div>
      <div style="width:22px; height:22px; border-radius:50%; background:#7a4c54; color:#fff; font:700 9px Georgia,serif; display:flex; align-items:center; justify-content:center; border:2px solid #fff; margin-left:-6px;">A</div>
    </div>
    <span style="font-size: 11.5px; color:#71717a;">5 reviewers</span>
    <div style="margin-left:auto; display:inline-flex; align-items:center; gap: 6px; background:#f0fdf4; border:1px solid #bbf7d0; color:#166534; font-size: 11.5px; font-weight: 600; padding: 3px 10px; border-radius: 999px;">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M8 12.5L11 15.5L16 9.5"/></svg>
      concluded
    </div>
  </div>

  <!-- WAITING STATE -->
  <div style="margin-top: 18px; padding: 12px 14px; background:#fafafa; border:1px solid #f0f0f2; border-radius: 10px; display:flex; align-items:center; gap: 10px;">
    <div style="width:14px; height:14px; border:2px solid #e4e4e7; border-top-color:#52525b; border-radius:50%; animation: sp 0.8s linear infinite;"></div>
    <span style="font-size: 12px; color:#52525b;">Replication Skeptic is thinking…</span>
    <span style="margin-left:auto; font-size: 11px; color:#a1a1aa;" class="mono">2s</span>
  </div>

  <div style="margin-top: 16px; font-size: 10px; color:#a1a1aa; letter-spacing: 0.07em; text-transform: uppercase; font-weight:700;">Timeline · round divider + roster + waiting</div>
</div>
<style>@keyframes sp { to { transform: rotate(360deg); } }</style>
</body>
</html>
